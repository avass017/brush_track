{% extends "client/client.html" %}
{% load crispy_forms_tags %}

{% block content %}

<style>

/* ================= GLOBAL BACKGROUND ================= */
body {
    background: #f5f7fa !important;
    font-family: "Inter", "Segoe UI", sans-serif;
}

/* ================= MAIN WRAPPER ================= */
.complaint-wrapper {
    max-width: 900px;
    margin: 70px auto;
    padding: 0 25px;
}

/* ================= PAGE HEADER ================= */
.page-header {
    margin-bottom: 35px;
}

.page-title {
    font-size: 26px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 6px;
}

.page-subtitle {
    font-size: 14px;
    color: #6b7280;
}

/* ================= FORM CARD ================= */
.form-card {
    background: #ffffff;
    border-radius: 14px;
    padding: 45px 50px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.05);
    transition: 0.3s ease;
}

.form-card:hover {
    box-shadow: 0 14px 40px rgba(0,0,0,0.08);
}

/* ================= FORM ELEMENT SPACING ================= */
.form-group,
.mb-3 {
    margin-bottom: 22px !important;
}

/* ================= INPUT STYLING ================= */
input,
select,
textarea {
    border-radius: 8px !important;
    border: 1px solid #d1d5db !important;
    padding: 12px 14px !important;
    font-size: 14px;
    background-color: #ffffff !important;
    transition: all 0.2s ease;
}

input:focus,
select:focus,
textarea:focus {
    border-color: #2563eb !important;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12) !important;
}

/* Textarea proper height */
textarea {
    min-height: 140px !important;
    resize: vertical;
}

/* ================= BUTTON SECTION ================= */
.button-group {
    margin-top: 35px;
    padding-top: 20px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    justify-content: flex-end;
    gap: 15px;
}

/* Cancel Button */
.btn-cancel {
    padding: 9px 22px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #374151;
    text-decoration: none;
    transition: 0.2s ease;
}

.btn-cancel:hover {
    background: #f3f4f6;
}

/* Submit Button */
.btn-submit {
    padding: 9px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    background: #2563eb;
    color: #ffffff;
    border: none;
    transition: 0.2s ease;
}

.btn-submit:hover {
    background: #1e40af;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {

    .complaint-wrapper {
        margin: 40px auto;
    }

    .form-card {
        padding: 30px 25px;
    }

    .button-group {
        flex-direction: column;
        align-items: stretch;
    }

    .btn-cancel,
    .btn-submit {
        text-align: center;
    }
}

</style>

<div class="complaint-wrapper">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-title">Submit a Complaint</div>
        <div class="page-subtitle">
            Please provide complete and accurate details regarding your issue.
        </div>
    </div>

    <!-- Form Card -->
    <div class="form-card">

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form|crispy }}

            <div class="button-group">
                <a href="" class="btn-cancel">
                    Cancel
                </a>

                <button type="submit" class="btn-submit">
                    Submit Complaint
                </button>
            </div>
        </form>

    </div>

</div>

{% endblock %}
