{% extends "client/client.html" %}
{% load crispy_forms_tags %}

{% block content %}

<style>

.rating-card{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.08);
}

.btn-submit{
background:#2563eb;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
font-weight:600;
}

</style>

<div class="rating-card">

<h3>Rate Supervisor</h3>

<form method="post">

{% csrf_token %}

{{ form|crispy }}

<button type="submit" class="btn-submit">
Submit Rating
</button>

</form>

</div>

{% endblock %}
