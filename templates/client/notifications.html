{% extends "client/client.html" %}

{% block content %}

<h3>Your Notifications</h3>

{% for n in notifications %}

<div style="background:#ffffff;padding:15px;margin-bottom:10px;border-radius:10px;border-left:5px solid #0d6efd">

<b>{{ n.message }}</b>

<br>

<small style="color:gray">{{ n.date_time }}</small>

</div>

{% empty %}

<p>No Notifications</p>

{% endfor %}

{% endblock %}
