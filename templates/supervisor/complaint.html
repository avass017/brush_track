{% extends "supervisor/super.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
/* ===== GLOBAL PAGE ===== */
body, .container {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(to right, #eef2f7, #f8fafc);
    color: #0f172a;
}

.container {
    padding: 120px 40px 40px 40px; /* space for fixed navbar */
    min-height: calc(100vh - 120px);
    animation: fadeInPage 0.5s ease forwards;
}

/* ===== MAIN CARD ===== */
.table-card {
    background-color: #ffffff;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.06);
    padding: 30px;
    transition: all 0.3s ease;
}
.table-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.08);
}

/* ===== PAGE HEADER ===== */
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
}
.page-title {
    font-weight: 700;
    font-size: 28px;
    color: #2563eb;
}

/* ===== TABLE STYLING ===== */
.table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 14px;
    overflow: hidden;
    background-color: #ffffff;
}

.table thead th {
    background: #e5e7eb;
    font-weight: 600;
    font-size: 14px;
    color: #495057;
    text-align: center;
    padding: 14px 12px;
}

.table tbody td {
    vertical-align: middle;
    font-size: 14px;
    color: #495057;
    text-align: center;
    padding: 12px 12px;
    transition: background 0.25s ease, transform 0.2s ease;
}

.table tbody tr:hover {
    background-color: #eef4ff;
    transform: translateX(3px);
}

/* ===== MODERN BUTTONS ===== */
.btn-action {
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 25px;
    border: none;
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    transition: all 0.25s ease;
}

.btn-reply {
    background: linear-gradient(135deg, #10b981, #34d399);
}

.btn-reply:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(16,185,129,0.3);
}

.btn-read {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
}

.btn-read:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(37,99,235,0.3);
}

/* ===== EMPTY ROW ===== */
.empty-row {
    text-align: center;
    padding: 40px;
    color: #6b7280;
    font-style: italic;
    font-size: 14px;
}

/* ===== PAGE ANIMATION ===== */
@keyframes fadeInPage {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
}

/* ===== RESPONSIVE ===== */
.table-responsive {
    overflow-x: auto;
}

@media (max-width: 768px) {
    .container {
        padding: 100px 20px 20px 20px;
    }
    .page-title {
        font-size: 22px;
    }
}
</style>

<div class="container">

    <!-- Page Header -->
    <div class="page-header">
        <h4 class="page-title">Employee Complaints</h4>
    </div>

    <!-- Complaints Table Card -->
    <div class="table-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Sl No</th>
                        <th>Subject</th>

                        <th>Date</th>
                        <th>Send Reply</th>
                        <th>View Reply</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in data %}
                        <tr>
                            <td>{{ forloop.counter }}</td>
                            <td>{{ i.subject }}</td>

                            <td>{{ i.date }}</td>
                            <td>
        <a href="" class="btn-action btn-read">
    Reply
</a>
                            </td>
                            <td>
                                <a href="" class="btn-action btn-read">
                                    Read
                                </a>
                            </td>
                        </tr>
                    {% empty %}
                        <tr>
                            <td colspan="6" class="empty-row">No Complaints Found</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>

{% endblock %}
