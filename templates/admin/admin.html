
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise HR Dashboard</title>

<link rel="stylesheet" href="{% static 'assets/vendors/mdi/css/materialdesignicons.min.css' %}">

<style>

/* ================= GOOGLE FONT ================= */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
    --primary: #2563eb;
    --gradient: linear-gradient(180deg, #3b82f6, #6366f1);
    --sidebar-bg: #0f172a;
    --sidebar-hover: rgba(255,255,255,0.06);
    --text-light: #94a3b8;
    --bg-main: #f1f5f9;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg-main);
    color: #0f172a;
    overflow-x: hidden;
}

/* ================= SIDEBAR ================= */
.sidebar {
    position: fixed;
    width: 250px;
    height: 100vh;
    background: var(--sidebar-bg);
    padding-top: 25px;
    transition: all 0.4s ease;
}

.sidebar-header {
    text-align: center;
    color: white;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.5px;
    margin-bottom: 45px;
}

.sidebar ul {
    list-style: none;
    padding: 0;
}

.sidebar ul li {
    position: relative;
    margin: 6px 0;
}

.sidebar ul li a {
    display: flex;
    align-items: center;
    padding: 14px 22px;
    color: var(--text-light);
    text-decoration: none;
    font-weight: 500;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.sidebar ul li a i {
    margin-right: 14px;
    font-size: 20px;
}

/* Smooth Hover Slide */
.sidebar ul li a:hover {
    background: var(--sidebar-hover);
    color: #fff;
    transform: translateX(6px);
}

/* ===== Gradient Animated Active Indicator ===== */
.sidebar ul li.active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10%;
    height: 80%;
    width: 5px;
    border-radius: 0 6px 6px 0;
    background: var(--gradient);
    animation: glowBar 2s infinite alternate;
}

@keyframes glowBar {
    from { box-shadow: 0 0 6px #3b82f6; }
    to { box-shadow: 0 0 18px #6366f1; }
}

/* ================= NAVBAR ================= */
.navbar {
    position: fixed;
    left: 250px;
    right: 0;
    top: 0;
    height: 75px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    border-bottom-left-radius: 20px;
    border-bottom-right-radius: 20px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.05);
    z-index: 100;
}

.navbar-title {
    font-weight: 600;
    font-size: 18px;
}

.profile-box {
    display: flex;
    align-items: center;
    gap: 20px;
}

.btn-logout {
    background: var(--primary);
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    color: white;
    font-weight: 500;
    transition: 0.3s ease;
}

.btn-logout:hover {
    background: #1d4ed8;
    transform: translateY(-2px);
}

/* ================= CONTENT ================= */
.content {
    margin-left: 250px;
    padding: 120px 50px 50px 50px;
}

/* Animated Fade-In */
.card {
    background: white;
    border-radius: 16px;
    padding: 35px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    transition: all 0.3s ease;
    animation: fadeInUp 0.6s ease;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.08);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ================= FOOTER ================= */
.footer {
    margin-top: 60px;
    text-align: center;
    font-size: 14px;
    color: #64748b;
    padding-bottom: 20px;
}
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <div class="sidebar-header">HR Enterprise</div>
    <ul>
         <li><a href="{% url 'client_view'%}"><i class="mdi mdi-account-group"></i>Clients</a></li>
        <li><a href="{% url 'supervisors_view'%}"><i class="mdi mdi-account-group"></i>Supervisors</a></li>


    </ul>
</div>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <h4>Welcome, {{ request.user }}</h4>
    <a href="">
        <button class="btn-logout">Logout</button>
    </a>
</div>

<!-- ===== CONTENT ===== -->
<div class="content">

    <div class="content-card">
        {% block content %}
        {% endblock %}
    </div>


</div>

</body>
</html>
