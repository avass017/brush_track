{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painter Dashboard</title>

<link rel="stylesheet" href="{% static 'assets/vendors/mdi/css/materialdesignicons.min.css' %}">

<style>

/* GOOGLE FONT */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
--primary:#2563eb;
--gradient:linear-gradient(180deg,#3b82f6,#6366f1);
--sidebar-bg:#0f172a;
--sidebar-hover:rgba(255,255,255,0.06);
--text-light:#94a3b8;
--bg-main:#f1f5f9;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg-main);
color:#0f172a;
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
position:fixed;
width:250px;
height:100vh;
background:var(--sidebar-bg);
padding-top:25px;
}

.sidebar-header{
text-align:center;
color:white;
font-weight:600;
font-size:18px;
margin-bottom:45px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li{
margin:6px 0;
}

.sidebar ul li a{
display:flex;
align-items:center;
padding:14px 22px;
color:var(--text-light);
text-decoration:none;
font-weight:500;
border-radius:8px;
transition:.3s;
}

.sidebar ul li a i{
margin-right:14px;
font-size:20px;
}

.sidebar ul li a:hover{
background:var(--sidebar-hover);
color:#fff;
transform:translateX(6px);
}

/* NAVBAR */

.navbar{
position:fixed;
left:250px;
right:0;
top:0;
height:75px;
background:#ffffff;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
box-shadow:0 10px 35px rgba(0,0,0,0.05);
z-index:100;
}

.navbar-left{
font-weight:600;
font-size:18px;
}

/* NAVBAR RIGHT */
.navbar-right{
display:flex;
align-items:center;
gap:25px;
}

/* NOTIFICATION */

.notification{
position:relative;
cursor:pointer;
}

.notification i{
font-size:26px;
color:#334155;
transition:.3s;
}

.notification:hover i{
color:#2563eb;
}

/* BADGE */

.notification-count{
position:absolute;
top:-6px;
right:-6px;
background:#ef4444;
color:white;
font-size:11px;
font-weight:600;
padding:3px 6px;
border-radius:50%;
}

/* LOGOUT */

.btn-logout{
background:var(--primary);
border:none;
padding:8px 18px;
border-radius:8px;
color:white;
font-weight:500;
transition:.3s;
}

.btn-logout:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

/* CONTENT */

.content{
margin-left:250px;
padding:120px 50px 50px;
}

/* CARD */

.content-card{
background:white;
border-radius:16px;
padding:35px;
box-shadow:0 10px 40px rgba(0,0,0,0.06);
animation:fadeInUp .6s ease;
}

@keyframes fadeInUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-header">
Welcome Painter
</div>

<ul>

<li>
<a href="{% url 'painter_profile' %}">
<i class="mdi mdi-account"></i> Profile
</a>
</li>



<li>
<a href="{% url 'painter_assigned_works' %}"><i class="mdi mdi-bell"></i>work shedule
</a>
</li>





</ul>

</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="navbar-left">
Welcome, {{ request.user }}
</div>

<div class="navbar-right">

<!-- NOTIFICATION ICON -->

<a href="{% url 'painter_notifications' %}" class="notification">

<i class="mdi mdi-bell-outline"></i>

{% if notification_count > 0 %}
<span class="notification-count">
{{ notification_count }}
</span>
{% endif %}

</a>

<!-- LOGOUT -->

<a href="">
<button class="btn-logout">
Logout
</button>
</a>

</div>

</div>

<!-- CONTENT -->

<div class="content">

<div class="content-card">

{% block content %}
{% endblock %}

</div>

</div>

</body>
</html>
